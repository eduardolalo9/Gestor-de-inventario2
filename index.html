<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>
        // Evitar FOUC (Flash Of Unstyled Content): aplicar tema antes de renderizar
        (function() {
            try {
                var t = localStorage.getItem('inventarioApp_theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch(_) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de control de inventario para barra — gestión de productos, pedidos y conteo físico.">
    <!-- FIX 3: CSP granular — unsafe-inline solo donde es estrictamente necesario -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    https://fonts.gstatic.com data:;
        img-src     'self' data:;
        connect-src 'self' https://wa.me;
        object-src  'none';
        base-uri    'self';
        form-action 'self';
    ">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E"><!-- BUG-FIX m2: favicon URL-encoded -->
    <title>BarInventory - Barra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ================================================
           VARIABLES — POST FEED DESIGN SYSTEM
           ================================================ */
        :root {
            --ink:         #0b0c10;
            --surface:     #13141a;
            --card:        #1a1b23;
            --border:      rgba(255,255,255,0.07);
            --border-mid:  rgba(255,255,255,0.12);
            --accent:      #6c63ff;
            --accent-2:    #ff6b6b;
            --accent-3:    #ffd166;
            --accent-green:#06d6a0;
            --accent-blue: #4cc9f0;
            --txt-primary:   #f0f0f5;
            --txt-secondary: #8b8ca8;
            --txt-muted:     #50516a;
            --glow-accent: 0 0 24px rgba(108,99,255,0.22);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.40), 0 1px 3px rgba(0,0,0,0.30);
            --shadow-modal: 0 32px 80px rgba(0,0,0,0.65), 0 8px 24px rgba(0,0,0,0.40);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ================================================
           TEMA CLARO — overrides de variables
           ================================================ */
        html[data-theme="light"] {
            --ink:         #f4f5fb;
            --surface:     #eaebf5;
            --card:        #ffffff;
            --border:      rgba(0,0,0,0.08);
            --border-mid:  rgba(0,0,0,0.15);
            --accent:      #6c63ff;
            --accent-2:    #ff6b6b;
            --accent-3:    #e6a817;
            --accent-green:#06d6a0;
            --accent-blue: #4cc9f0;
            --txt-primary:   #0d0e14;
            --txt-secondary: #4a4b6a;
            --txt-muted:     #8b8ca8;
            --glow-accent: 0 0 24px rgba(108,99,255,0.12);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-modal: 0 32px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.10);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            font-weight: 400;
            background-color: var(--ink);
            color: var(--txt-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,107,107,0.07) 0%, transparent 55%);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.35); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(108,99,255,0.6); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes springUp {
            0% { opacity: 0; transform: translateY(72px) scale(0.91); }
            52% { opacity: 1; transform: translateY(-8px) scale(1.015); }
            76% { transform: translateY(4px) scale(0.997); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideIn {
            from { transform: scaleX(0); opacity: 0; }
            to { transform: scaleX(1); opacity: 1; }
        }
        @keyframes toastPop {
            0% { opacity: 0; transform: translateX(-50%) translateY(32px) scale(0.86); }
            56% { opacity: 1; transform: translateX(-50%) translateY(-6px) scale(1.04); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
        @keyframes tabContentIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes rowIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

        .animate-fadeIn  { animation: fadeIn  0.22s ease-out both; }
        .animate-slideIn { animation: slideIn 0.26s var(--ease-spring) both; transform-origin: left; }
        .animate-slideUp { animation: springUp 0.46s var(--ease-spring) both; }
        .animate-pulse   { animation: pulse 2s ease-in-out infinite; }

        #tabContent { animation: tabContentIn 0.30s var(--ease-out) both; }

        .hidden { display: none !important; }

        /* Header */
        body > .sticky.top-0 {
            background: linear-gradient(135deg, #1e1740 0%, #12173d 40%, #1a1020 100%) !important;
            border-bottom: 1px solid var(--border-mid) !important;
            box-shadow: 0 4px 24px rgba(0,0,0,.50), 0 1px 0 rgba(108,99,255,.25) !important;
        }
        body > .sticky.top-0 h1 {
            font-family: 'Syne', sans-serif !important;
            font-weight: 700 !important;
            font-size: 1.8rem !important;
            line-height: 1.1 !important;
            letter-spacing: -0.02em !important;
            background: linear-gradient(120deg, #fff 40%, rgba(108,99,255,.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #hamburgerBtn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,.10);
            border: 1px solid rgba(255,255,255,.18);
            cursor: pointer;
            transition: background .18s ease, transform .14s var(--ease-spring);
            color: #fff;
        }
        #hamburgerBtn:hover  { background: rgba(108,99,255,.35); transform: scale(1.06); }
        #hamburgerBtn:active { transform: scale(.94); }

        /* Tab bar oculto */
        .bg-white.shadow-sm.sticky { display: none !important; }

        /* Sidebar */
        #sbOverlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.52);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 300;
            opacity: 0; pointer-events: none;
            transition: opacity .28s ease;
        }
        #sbOverlay.sb-open { opacity: 1; pointer-events: auto; }

        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 272px;
            display: flex; flex-direction: column;
            background: linear-gradient(165deg,#1c1d2e 0%,#13141a 55%,#0f1018 100%);
            border-right: 1px solid var(--border-mid);
            box-shadow: 10px 0 40px rgba(0,0,0,.55);
            z-index: 310;
            transform: translateX(-100%);
            transition: transform .34s var(--ease-spring);
            overflow: hidden;
        }
        #sidebar.sb-open { transform: translateX(0); }

        #sbHead {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg,rgba(108,99,255,.14) 0%,transparent 100%);
        }
        #sbHead .sb-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.15rem;
            letter-spacing: -.02em;
            background: linear-gradient(120deg,#fff 30%,rgba(108,99,255,.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #sbCloseBtn {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--txt-secondary);
            transition: background .15s ease, color .15s ease;
        }
        #sbCloseBtn:hover { background: rgba(255,107,107,.22); color: #ff6b6b; }

        #sbNav {
            flex: 1; overflow-y: auto;
            padding: 10px 8px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .sb-item {
            display: flex; align-items: center; gap: 13px;
            padding: 25px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500; font-size: 1.1rem;
            color: var(--txt-secondary);
            background: transparent; border: 1px solid transparent;
            cursor: pointer; text-align: left; width: 100%;
            transition: background .16s ease, color .16s ease, border-color .16s ease, transform .14s var(--ease-spring);
            position: relative; overflow: hidden;
        }
        .sb-item:hover {
            background: rgba(255,255,255,.055);
            color: var(--txt-primary);
            transform: translateX(3px);
        }
        .sb-item.sb-active {
            background: linear-gradient(135deg,rgba(108,99,255,.22) 0%,rgba(76,201,240,.09) 100%);
            color: var(--txt-primary);
            border-color: rgba(108,99,255,.28);
        }
        .sb-item.sb-active .sb-ico { color: var(--accent); }
        .sb-item.sb-active::before {
            content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
            width: 3px; border-radius: 0 3px 3px 0;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
        }
        .sb-ico { width: 19px; height: 19px; color: var(--txt-muted); transition: color .16s ease; }

        .sb-sep {
            font-family: 'Outfit', sans-serif;
            font-size: .75rem; font-weight: 600;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--txt-muted);
            padding: 10px 14px 4px;
        }

        #sbFoot {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
        }
        #sbFoot p {
            font-family: 'Outfit', sans-serif;
            font-size: .68rem; color: var(--txt-muted);
            text-align: center;
        }

        .max-w-7xl.mx-auto.px-3 { padding-top: .4rem !important; padding-bottom: .4rem !important; }

        /* Tailwind overrides */
        .bg-white       { background-color: var(--card)    !important; }
        .bg-gray-50     { background-color: var(--surface) !important; }
        .bg-gray-100    { background-color: #1f2030        !important; }
        .text-gray-900  { color: var(--txt-primary)   !important; }
        .text-gray-600  { color: var(--txt-secondary) !important; }
        .text-gray-500  { color: var(--txt-secondary) !important; }
        .text-gray-400  { color: var(--txt-muted)     !important; }
        .text-gray-700  { color: var(--txt-secondary) !important; }
        .border-gray-200{ border-color: var(--border)  !important; }
        .divide-gray-200 > * + * { border-color: var(--border) !important; }
        .border-gray-300{ border-color: var(--border-mid) !important; }

        /* Cards */
        .bg-white.rounded-xl, .bg-white.rounded-2xl, .bg-white.rounded-xl.shadow-md, .bg-white.rounded-2xl.shadow-md {
            background-color: var(--card) !important;
            border: 1px solid var(--border) !important;
            border-radius: 16px !important;
            box-shadow: var(--shadow-card) !important;
            position: relative; overflow: hidden;
            transition: box-shadow 0.22s ease, transform 0.22s ease, border-color 0.22s ease !important;
        }
        .bg-white.rounded-xl::before, .bg-white.rounded-2xl::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-blue) 50%, var(--accent-2) 100%);
            opacity: 0; transition: opacity 0.22s ease;
        }
        .bg-white.rounded-xl:hover::before, .bg-white.rounded-2xl:hover::before { opacity: 1; }
        .bg-white.rounded-xl:hover, .bg-white.rounded-2xl:hover {
            border-color: var(--border-mid) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.50), 0 2px 8px rgba(0,0,0,0.30) !important;
            transform: translateY(-2px);
        }

        /* Shadows */
        .shadow-md  { box-shadow: var(--shadow-card) !important; }
        .shadow-sm  { box-shadow: 0 1px 6px rgba(0,0,0,0.35) !important; }
        .shadow-2xl { box-shadow: var(--shadow-modal) !important; }

        /* Tables */
        table { font-family: 'Outfit', sans-serif !important; }
        thead th {
            font-family: 'Syne', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.7rem !important;
            letter-spacing: 0.08em !important;
            text-transform: uppercase !important;
        }
        thead.bg-gradient-to-r {
            background: linear-gradient(135deg, #1e1740 0%, #1a1535 100%) !important;
        }
        thead.bg-gradient-to-r th { color: var(--txt-secondary) !important; }
        tbody tr {
            transition: background-color 0.14s ease !important;
            border-bottom: 1px solid var(--border) !important;
        }
        tbody tr:hover { background-color: rgba(108,99,255,0.06) !important; }
        .hover\:bg-purple-50:hover { background-color: rgba(108,99,255,0.10) !important; }
        .bg-purple-50              { background-color: rgba(108,99,255,0.10) !important; }
        .hover\:bg-purple-100:hover { background-color: rgba(108,99,255,0.15) !important; }
        .hover\:bg-gray-50:hover { background-color: rgba(255,255,255,0.04) !important; }

        @media (max-width: 640px) {
            table { font-size: 12px !important; }
            th, td { padding: 0.45rem !important; }
        }

        /* Buttons */
        button {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 0.01em !important;
            min-height: 44px;
            position: relative; overflow: hidden;
            cursor: pointer;
            transition: transform 0.14s var(--ease-spring), box-shadow 0.16s ease !important;
        }
        button::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
            border-radius: inherit; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        button:hover::before { opacity: 1; }
        button:active { transform: scale(0.955) !important; box-shadow: none !important; }
        button:focus-visible { outline: 2px solid rgba(108,99,255,0.7); outline-offset: 2px; }

        button[class*="bg-gradient"]:hover {
            transform: translateY(-2px) scale(1.01) !important;
            box-shadow: 0 10px 28px rgba(108,99,255,0.38) !important;
        }
        button[class*="bg-gradient"]:active { transform: translateY(0) scale(0.97) !important; }

        button[class*="from-purple"][class*="to-orange"] {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%) !important;
        }
        button[class*="from-purple"][class*="to-blue"],
        button[class*="from-blue"][class*="to-purple"] {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-blue) 100%) !important;
        }
        button[class*="from-green"][class*="to-emerald"] {
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%) !important;
        }
        button[class*="from-red"][class*="to-orange"] {
            background: linear-gradient(135deg, var(--accent-2) 0%, #e65100 100%) !important;
        }

        button[class*="border-gray-200"] {
            background: transparent !important;
            border-color: var(--border-mid) !important;
            color: var(--txt-primary) !important;
        }
        button[class*="border-gray-200"]:hover {
            background: rgba(255,255,255,0.06) !important;
            border-color: rgba(108,99,255,0.45) !important;
        }
        button[class*="border-purple-500"] {
            border-color: var(--accent) !important;
            color: var(--accent) !important;
        }
        button[class*="border-purple-500"]:hover {
            background: rgba(108,99,255,0.10) !important;
        }
        button[class*="border-green"] {
            border-color: var(--accent-green) !important;
            color: var(--accent-green) !important;
        }
        button[class*="border-green"]:hover {
            background: rgba(6,214,160,0.10) !important;
        }

        /* Inputs */
        input, select, textarea {
            font-family: 'Outfit', sans-serif !important;
            font-size: 15px !important;
            min-height: 44px !important;
            background-color: var(--surface) !important;
            color: var(--txt-primary) !important;
            border-color: var(--border-mid) !important;
            transition: border-color 0.18s ease, box-shadow 0.18s ease !important;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.18), 0 1px 4px rgba(0,0,0,0.30) !important;
        }
        input[type="number"] {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 14px !important;
        }
        input:disabled { background-color: #0f1015 !important; color: var(--txt-muted) !important; }
        input::placeholder, textarea::placeholder { color: var(--txt-muted) !important; }

        select { appearance: auto; color-scheme: dark; }
        label.block { color: var(--txt-secondary) !important; }

        .text-purple-600 { color: var(--accent) !important; }
        .text-purple-700 { color: var(--accent) !important; }
        .text-orange-500 { color: var(--accent-3) !important; }
        .text-orange-600 { color: var(--accent-2) !important; }
        .text-green-700  { color: var(--accent-green) !important; }
        .text-gray-300   { color: var(--txt-muted) !important; }
        .bg-purple-100   { background-color: rgba(108,99,255,0.18) !important; }
        .bg-purple-50    { background-color: rgba(108,99,255,0.10) !important; }
        .bg-orange-50    { background-color: rgba(255,209,102,0.10) !important; }
        .bg-purple-600   { background-color: var(--accent) !important; }
        .text-purple-700.bg-purple-100 { color: #a89cff !important; }
        .bg-gray-50.rounded-xl, .bg-gray-50.rounded-2xl {
            background-color: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
        }
        .bg-gray-50.rounded-xl.overflow-hidden { background-color: var(--surface) !important; }

        button[class*="from-purple-500"][class*="to-blue-500"] {
            background: linear-gradient(135deg, var(--accent), var(--accent-blue)) !important;
        }
        button[class*="border-gray-300"] {
            border-color: var(--border-mid) !important;
            color: var(--txt-secondary) !important;
            background: transparent !important;
        }
        button[class*="border-gray-300"]:hover {
            border-color: var(--accent) !important;
            color: var(--txt-primary) !important;
        }

        /* Modals */
        #productModal, #orderModal, #inventarioModal {
            animation: fadeIn 0.25s ease-out both !important;
            backdrop-filter: blur(12px) saturate(1.6) !important;
            -webkit-backdrop-filter: blur(12px) saturate(1.6) !important;
            background-color: rgba(0,0,0,0.65) !important;
        }
        #productModal > div, #orderModal > div, #inventarioModal > div {
            animation: springUp 0.46s var(--ease-spring) both !important;
            background-color: var(--card) !important;
            border: 1px solid var(--border-mid) !important;
            border-radius: 24px 24px 0 0 !important;
            box-shadow: var(--shadow-modal) !important;
        }
        @media (min-width: 768px) {
            #productModal > div, #orderModal > div, #inventarioModal > div { border-radius: 24px !important; }
        }
        #productModal .w-12.h-1\.5, #orderModal .w-12.h-1\.5, #inventarioModal .w-12.h-1\.5 {
            background: linear-gradient(90deg, var(--accent), var(--accent-2)) !important;
            opacity: 0.5 !important;
        }
        #productModal h2, #orderModal h2, #inventarioModal h2 {
            font-family: 'Syne', sans-serif !important;
            font-weight: 700 !important;
            letter-spacing: -0.025em !important;
            color: var(--txt-primary) !important;
        }

        /* Toast */
        #toast { animation: toastPop 0.44s var(--ease-spring) both !important; }
        #toast > div {
            background: linear-gradient(135deg, #2a1f5e 0%, #1a1535 100%) !important;
            border: 1px solid rgba(108,99,255,0.45) !important;
            box-shadow: 0 12px 36px rgba(0,0,0,0.55), var(--glow-accent) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.875rem !important;
            padding: 12px 24px !important;
            color: var(--txt-primary) !important;
        }
        #toast .w-2.h-2.rounded-full {
            background: var(--accent) !important;
            box-shadow: 0 0 8px var(--accent) !important;
        }

        h3.text-xl.font-bold, h3.text-lg.font-bold, .text-xl.font-bold, .text-2xl.font-bold, .text-lg.font-semibold {
            font-family: 'Syne', sans-serif !important;
            letter-spacing: -0.02em !important;
            color: var(--txt-primary) !important;
        }

        span.text-sm.font-medium.text-purple-600.bg-purple-50 {
            background: rgba(108,99,255,0.15) !important;
            color: #a89cff !important;
            border: 1px solid rgba(108,99,255,0.25) !important;

            body   { font-size: 14px; }

        /* ================================================
           OVERRIDES MODO CLARO — colores hardcodeados
           ================================================ */

            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,107,107,0.04) 0%, transparent 55%);
        }
        html[data-theme="light"] .bg-gray-100 { background-color: #e2e3ef !important; }
        html[data-theme="light"] thead.bg-gradient-to-r {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%) !important;
        }
        html[data-theme="light"] thead.bg-gradient-to-r th { color: #4c3db5 !important; }
        html[data-theme="light"] #sidebar {
            background: linear-gradient(165deg,#f0effc 0%,#f8f7ff 55%,#ffffff 100%);
            border-right: 1px solid rgba(108,99,255,0.15);
        }
        html[data-theme="light"] #sbHead {
            background: linear-gradient(135deg,rgba(108,99,255,0.09) 0%,transparent 100%);
            border-bottom: 1px solid rgba(108,99,255,0.10);
        }
        html[data-theme="light"] #sbCloseBtn {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.10);
            color: var(--txt-secondary);
        }
        html[data-theme="light"] #sbCloseBtn:hover { background: rgba(255,107,107,0.12); color: #cc4444; }
        html[data-theme="light"] .sb-item { color: var(--txt-secondary); }
        html[data-theme="light"] .sb-item:hover { background: rgba(108,99,255,0.07); color: var(--txt-primary); }
        html[data-theme="light"] .sb-item.sb-active {
            background: linear-gradient(135deg,rgba(108,99,255,0.14) 0%,rgba(76,201,240,0.06) 100%);
            border-color: rgba(108,99,255,0.22);
            color: var(--txt-primary);
        }
        html[data-theme="light"] #sbFoot p { color: var(--txt-muted); }
        html[data-theme="light"] body > .sticky.top-0 {
            background: linear-gradient(135deg, #3b2fa8 0%, #1a2485 40%, #2d1060 100%) !important;
        }
        html[data-theme="light"] #toast > div {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%) !important;
            border: 1px solid rgba(108,99,255,0.30) !important;
            color: #3b2fa8 !important;
        }
        html[data-theme="light"] #toast .w-2.h-2.rounded-full {
            background: var(--accent) !important;
        }
        html[data-theme="light"] #productModal > div,
        html[data-theme="light"] #orderModal > div,
        html[data-theme="light"] #inventarioModal > div {
            background-color: #ffffff !important;
            border: 1px solid rgba(108,99,255,0.20) !important;
        }
        html[data-theme="light"] tbody tr:hover { background-color: rgba(108,99,255,0.04) !important; }
        html[data-theme="light"] .hover\:bg-purple-50:hover { background-color: rgba(108,99,255,0.06) !important; }
        html[data-theme="light"] .bg-purple-50              { background-color: rgba(108,99,255,0.06) !important; }
        html[data-theme="light"] ::selection { background: rgba(108,99,255,0.18); color: #3b2fa8; }
        html[data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.25); }
        html[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(108,99,255,0.45); }
        html[data-theme="light"] select { color-scheme: light; }
        html[data-theme="light"] input:disabled { background-color: #e8e9f3 !important; }


        /* Botón toggle tema */
        #themeToggleBtn:hover { background: rgba(108,99,255,.35) !important; transform: scale(1.06); }
        #themeToggleBtn:active { transform: scale(.94) !important; }
        html[data-theme="light"] #themeToggleBtn { background: rgba(255,255,255,.20) !important; }

        /* ================================================
           MATERIAL DESIGN — Tarjetas de Inventario
           ================================================ */
        .inv-card {
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.28), 0 1px 3px rgba(0,0,0,0.18);
            overflow: hidden;
            transition: box-shadow 0.22s ease, transform 0.18s ease, border-color 0.22s ease;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .inv-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.38), 0 2px 8px rgba(0,0,0,0.24); border-color: var(--border-mid); }
        .inv-card:active { transform: scale(0.985); }
        .inv-card.has-data { border-left: 3px solid var(--accent); }

        .inv-card__ripple {
            position: absolute; inset: 0; border-radius: inherit;
            background: radial-gradient(circle at center, rgba(108,99,255,0.12) 0%, transparent 70%);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .inv-card:active .inv-card__ripple { opacity: 1; }

        .inv-card__header {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 14px 16px 10px;
            gap: 10px;
        }
        .inv-card__name {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 0.95rem;
            color: var(--txt-primary);
            line-height: 1.25;
            flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap;
        }
        .inv-card__code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem; font-weight: 500;
            color: var(--txt-muted);
            background: rgba(108,99,255,0.10);
            border: 1px solid rgba(108,99,255,0.15);
            border-radius: 6px;
            padding: 2px 7px;
            flex-shrink: 0;
            letter-spacing: 0.03em;
        }

        .inv-card__chips {
            display: flex; gap: 8px;
            padding: 0 16px 12px;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .inv-card__chips::-webkit-scrollbar { display: none; }

        .inv-chip {
            display: flex; flex-direction: column; align-items: center;
            background: var(--surface);
            border: 1px solid var(--border-mid);
            border-radius: 12px;
            padding: 8px 14px 7px;
            flex-shrink: 0;
            min-width: 72px;
            gap: 2px;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .inv-chip__label {
            font-size: 0.60rem; font-weight: 600;
            letter-spacing: 0.06em; text-transform: uppercase;
            color: var(--txt-muted);
            white-space: nowrap;
        }
        .inv-chip__icon { font-size: 1rem; line-height: 1; }
        .inv-chip__val {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: 1.15rem;
            color: var(--txt-primary);
            line-height: 1.1;
        }
        .inv-chip.entera  { border-color: rgba(108,99,255,0.30); }
        .inv-chip.entera .inv-chip__val { color: #a89cff; }
        .inv-chip.abierta { border-color: rgba(234,88,12,0.30); }
        .inv-chip.abierta .inv-chip__val { color: #fb923c; }
        .inv-chip.empty   { opacity: 0.38; }

        .inv-card__expand-btn {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            width: 100%;
            padding: 9px 16px;
            border-top: 1px solid var(--border);
            background: transparent;
            color: var(--accent);
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem; font-weight: 600;
            letter-spacing: 0.04em; text-transform: uppercase;
            transition: background 0.15s ease;
            cursor: pointer;
            min-height: unset;
        }
        .inv-card__expand-btn:hover { background: rgba(108,99,255,0.07); }
        .inv-card__expand-btn::before { display: none; } /* quitar el brillo del botón global */
        .inv-card__expand-btn svg { transition: transform 0.25s var(--ease-spring); flex-shrink: 0; }
        .inv-card__expand-btn.open svg { transform: rotate(180deg); }

        .inv-card__extra {
            display: none;
            padding: 4px 16px 14px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .inv-card__extra.open { display: flex; }

        .inv-card__group-badge {
            display: inline-flex; align-items: center;
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.04em; text-transform: uppercase;
            color: var(--txt-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 8px;
            margin-top: 1px;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .inv-card { animation: cardIn 0.28s var(--ease-out) both; }

        html[data-theme="light"] .inv-card { box-shadow: 0 2px 8px rgba(0,0,0,0.09), 0 1px 3px rgba(0,0,0,0.06); }
        html[data-theme="light"] .inv-chip  { background: #f8f7ff; }
        html[data-theme="light"] .inv-card__expand-btn:hover { background: rgba(108,99,255,0.05); }
        html[data-theme="light"] .inv-card__code { background: rgba(108,99,255,0.07); }

    </style>
</head>

                    style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);cursor:pointer;transition:background .18s ease,transform .14s;color:#fff;flex-shrink:0;">

                <button type="button" onclick="saveInventarioModal()" class="flex-1 px-4 py-2 bg-gradient-to-r from-purple-500 to-blue-500 text-white rounded-xl hover:shadow-lg transition-all transform active:scale-95 font-medium">Guardar</button>

    <script>

        // ==================== TEMA CLARO / OSCURO ====================
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const isDark = theme === 'dark';

            // Icono del header
            const moonIcon = document.getElementById('themeIconMoon');
            const sunIcon  = document.getElementById('themeIconSun');
            if (moonIcon) moonIcon.classList.toggle('hidden', !isDark);
            if (sunIcon)  sunIcon.classList.toggle('hidden', isDark);

            // Label del sidebar
            const sbLabel = document.getElementById('sbThemeLabel');
            if (sbLabel) sbLabel.textContent = isDark ? 'Modo claro' : 'Modo oscuro';

            // Icono del sidebar
            const sbBtn = document.getElementById('sbThemeBtn');
            if (sbBtn) {
                const sbSvgPath = sbBtn.querySelector('path');
                if (sbSvgPath) {
                    if (isDark) {
                        // luna
                        sbSvgPath.setAttribute('d', 'M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z');
                    } else {
                        // sol
                        sbSvgPath.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z');
                    }
                }
            }

            try { localStorage.setItem('inventarioApp_theme', theme); } catch(_) {}
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        function initTheme() {
            let saved = 'dark';
            try { saved = localStorage.getItem('inventarioApp_theme') || 'dark'; } catch(_) {}
            applyTheme(saved);
        }

        // ==================== FUNCIÓN DE ESCAPE PARA SEGURIDAD ====================
        function escapeHtml(unsafe) {
            if (unsafe === null || unsafe === undefined) return '';
            return String(unsafe)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ==================== ESTADO GLOBAL ENCAPSULADO ====================
        // Toda la mutación de estado ocurre a través de estas variables.
        // Para futuras refactorizaciones, centralizar aquí facilita migrar a un patrón store.
        let products = [];
        let cart = [];
        let orders = [];
        let inventories = [];
        let activeTab = 'inicio';
        let editingProductId = null;
        let searchTerm = '';
        let selectedGroup = 'Todos';
        let selectedArea = 'almacen';
        let expandedInventories = new Set();
        let expandedCards = new Set(); // IDs de tarjetas de inventario expandidas
        let inventarioConteo = {}; // { productId: { area: { enteras: 0, abiertas: [] } } }
        let inventarioModalProductId = null;
        let isInventarioModalOpen = false; // Para controlar botones de área

        const areas = {
            almacen: 'Almacén',
            barra1: 'Barra 1',
            barra2: 'Barra 2'
        };

        // ==================== PERSISTENCIA ====================
        // FIX 2 — localStorage: guardado granular con control de cuota
        const LS_WARN_BYTES = 4 * 1024 * 1024; // advertir al superar 4 MB de los ~5 MB totales
        let _lsQuotaWarned = false;

        function estimateStorageUsed() {
            let total = 0;
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const val = localStorage.getItem(key) || '';
                    total += (key.length + val.length) * 2; // UTF-16: 2 bytes/char
                }
            } catch (_) {}
            return total;
        }

        function saveToLocalStorage() {
            // Pares clave → valor a guardar (las claves "grandes" se guardan individualmente
            // para poder atrapar el error justo en la clave que lo provoca)
            const entries = [
                ['inventarioApp_products',            JSON.stringify(products)],
                ['inventarioApp_orders',              JSON.stringify(orders)],
                ['inventarioApp_inventories',         JSON.stringify(inventories)],
                ['inventarioApp_cart',                JSON.stringify(cart)],
                ['inventarioApp_activeTab',           activeTab],
                ['inventarioApp_selectedGroup',       selectedGroup],
                ['inventarioApp_selectedArea',        selectedArea],
                ['inventarioApp_searchTerm',          searchTerm],
                ['inventarioApp_expandedInventories', JSON.stringify(Array.from(expandedInventories))],
                ['inventarioApp_inventarioConteo',    JSON.stringify(inventarioConteo)]
            ];

            // Advertir si nos acercamos al límite (solo una vez por sesión)
            if (!_lsQuotaWarned) {
                const used = estimateStorageUsed();
                if (used > LS_WARN_BYTES) {
                    _lsQuotaWarned = true;
                    showNotification('⚠️ Almacenamiento al ' + Math.round(used / (5*1024*1024) * 100) + '%. Exporta y limpia historiales.');
                }
            }

            for (const [key, value] of entries) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.error('Error al guardar "' + key + '":', e);
                    if (key === 'inventarioApp_inventories') {
                        showNotification('⚠️ Historial muy grande. Usa "Exportar datos" y elimina historiales antiguos.');
                    } else if (key === 'inventarioApp_inventarioConteo') {
                        showNotification('⚠️ Conteo de inventario no pudo guardarse. Exporta tus datos ahora.');
                    } else {
                        showNotification('⚠️ Error al guardar datos. Exporta un respaldo inmediatamente.');
                    }
                    // Si falla una clave crítica, detener para no corromper el estado parcial
                    break;
                }
            }
        }

        function loadFromLocalStorage() {
            const safeGet = (key, fallback) => {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : fallback;
                } catch (e) {
                    console.warn('Dato corrupto en localStorage para "' + key + '", usando valor por defecto.', e);
                    return fallback;
                }
            };

            products   = safeGet('inventarioApp_products',   []);
            orders     = safeGet('inventarioApp_orders',     []);
            inventories = safeGet('inventarioApp_inventories', []);
            cart       = safeGet('inventarioApp_cart',       []);

            const storedTab   = localStorage.getItem('inventarioApp_activeTab');
            const storedGroup = localStorage.getItem('inventarioApp_selectedGroup');
            const storedArea  = localStorage.getItem('inventarioApp_selectedArea');
            const storedSearch = localStorage.getItem('inventarioApp_searchTerm');

            if (storedTab)    activeTab     = storedTab;
            if (storedGroup)  selectedGroup = storedGroup;
            if (storedArea)   selectedArea  = storedArea;
            if (storedSearch) searchTerm    = storedSearch;

            const storedExpanded = safeGet('inventarioApp_expandedInventories', []);
            expandedInventories = new Set(Array.isArray(storedExpanded) ? storedExpanded : []);

            const parsedConteo = safeGet('inventarioApp_inventarioConteo', {});
            const migrated = {};
            Object.keys(parsedConteo).forEach(prodId => {
                const val = parsedConteo[prodId];
                if (!val || typeof val !== 'object') return; // skip invalid entries
                if (typeof val.enteras !== 'undefined' && val.almacen === undefined && val.barra1 === undefined && val.barra2 === undefined) {  // BUG-FIX M3: usar === undefined para no fallar cuando area vale 0
                    migrated[prodId] = { almacen: val };
                } else {
                    migrated[prodId] = val;
                }
            });
            inventarioConteo = migrated;
        }

        // BUG-FIX m3: updateNetworkStatus definida a nivel global
        function updateNetworkStatus() {
            const existing = document.getElementById('networkStatus');
            if (existing) existing.remove();
            if (!navigator.onLine) {
                const bar = document.createElement('div');
                bar.id = 'networkStatus';
                bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#f59e0b;color:#fff;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:9999;';
                bar.textContent = '⚠️ Sin conexión — los datos están guardados localmente';
                document.body.appendChild(bar);
            }
        }

        function initializeApp() {
            loadFromLocalStorage();
            // FIX 1 — sincronizar stockByArea con inventarioConteo al arranque
            syncStockByAreaFromConteo();

            window.addEventListener('beforeunload', () => saveToLocalStorage());

            // BUG-FIX m3: updateNetworkStatus ahora es global (definida fuera de initializeApp)
            window.addEventListener('online',  updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);
            updateNetworkStatus();

            if (products.length === 0) {
                const initialProducts = [
                    { id: 'PRD-001', name: 'Vodka Premium', stockByArea: { almacen: 12, barra1: 5, barra2: 3 }, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-002', name: 'Ron Añejo', stockByArea: { almacen: 8, barra1: 4, barra2: 2 }, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-003', name: 'Whisky Escocés', stockByArea: { almacen: 4, barra1: 2, barra2: 1 }, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-004', name: 'Gin London Dry', stockByArea: { almacen: 10, barra1: 3, barra2: 2 }, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-005', name: 'Tequila Reposado', stockByArea: { almacen: 3, barra1: 2, barra2: 1 }, unit: 'Botellas', group: 'Premium' },
                    { id: 'PRD-006', name: 'Cerveza Nacional', stockByArea: { almacen: 48, barra1: 24, barra2: 18 }, unit: 'Unidad', group: 'Bebidas' },
                    { id: 'PRD-007', name: 'Cerveza Importada', stockByArea: { almacen: 18, barra1: 12, barra2: 6 }, unit: 'Unidad', group: 'Bebidas' },
                    { id: 'PRD-008', name: 'Vino Tinto Reserva', stockByArea: { almacen: 15, barra1: 6, barra2: 4 }, unit: 'Botellas', group: 'Vinos' },
                    { id: 'PRD-009', name: 'Vino Blanco', stockByArea: { almacen: 12, barra1: 5, barra2: 3 }, unit: 'Botellas', group: 'Vinos' },
                    { id: 'PRD-010', name: 'Coca Cola', stockByArea: { almacen: 36, barra1: 20, barra2: 15 }, unit: 'Unidad', group: 'Bebidas' },
                    { id: 'PRD-011', name: 'Agua Mineral', stockByArea: { almacen: 42, barra1: 25, barra2: 18 }, unit: 'Unidad', group: 'Bebidas' },
                    { id: 'PRD-012', name: 'Jugo de Naranja', stockByArea: { almacen: 8, barra1: 4, barra2: 3 }, unit: 'Litros', group: 'Bebidas' },
                    { id: 'PRD-013', name: 'Limones', stockByArea: { almacen: 5, barra1: 2, barra2: 1.5 }, unit: 'Kilos', group: 'Frutas' },
                    { id: 'PRD-014', name: 'Hielo', stockByArea: { almacen: 20, barra1: 10, barra2: 8 }, unit: 'Kilos', group: 'Insumos' }
                ];
                products = initialProducts;
                saveToLocalStorage();
            }

            switchTab(activeTab);
        }

        function getTotalStock(product) {
            if (!product.stockByArea) return 0;
            return (product.stockByArea.almacen || 0) + (product.stockByArea.barra1 || 0) + (product.stockByArea.barra2 || 0);
        }

        // FIX 1 — Fuente única de verdad: inventarioConteo → stockByArea
        // Reconstruye product.stockByArea para todos los productos a partir de
        // inventarioConteo, evitando divergencias entre ambas estructuras.
        function syncStockByAreaFromConteo() {
            products.forEach(p => {
                if (!p.stockByArea) p.stockByArea = { almacen: 0, barra1: 0, barra2: 0 };
                Object.keys(areas).forEach(area => {
                    const d = inventarioConteo[p.id] && inventarioConteo[p.id][area];
                    // Solo sobreescribir si hay un dato explícito en conteo
                    if (d && typeof d.enteras === 'number') {
                        p.stockByArea[area] = d.enteras;
                    }
                });
            });
        }

        function getAvailableGroups() {
            const groups = new Set(products.map(p => p.group).filter(g => g && g.trim() !== ''));
            return ['Todos', ...Array.from(groups).sort()];
        }

        function sbOpen() {
            document.getElementById('sidebar').classList.add('sb-open');
            document.getElementById('sbOverlay').classList.add('sb-open');
            document.getElementById('hamburgerBtn').setAttribute('aria-expanded','true');
            document.body.style.overflow = 'hidden';
        }
        function sbClose() {
            document.getElementById('sidebar').classList.remove('sb-open');
            document.getElementById('sbOverlay').classList.remove('sb-open');
            document.getElementById('hamburgerBtn').setAttribute('aria-expanded','false');
            document.body.style.overflow = '';
            // Devolver foco al botón hamburguesa para accesibilidad
            document.getElementById('hamburgerBtn').focus();
        }
        // BUG-FIX C4: ESC solo cierra el sidebar si ningún modal está abierto
        document.addEventListener('keydown', e => {
            if (e.key !== 'Escape') return;
            const anyModal = ['productModal','orderModal','inventarioModal'].some(
                id => !document.getElementById(id).classList.contains('hidden')
            );
            if (!anyModal) sbClose();
        });

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const indicator = btn.querySelector('.tab-indicator');
                if (btn.dataset.tab === tab) {
                    btn.classList.remove('text-gray-600');
                    btn.classList.add('text-gray-900');
                    if (!indicator) {
                        const div = document.createElement('div');
                        div.className = 'tab-indicator absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-purple-500 to-orange-500 rounded-t-full animate-slideIn';
                        btn.appendChild(div);
                    }
                } else {
                    btn.classList.remove('text-gray-900');
                    btn.classList.add('text-gray-600');
                    if (indicator) indicator.remove();
                }
            });
            document.querySelectorAll('.sb-item').forEach(btn => {
                if (btn.dataset.sbTab === tab) btn.classList.add('sb-active');
                else btn.classList.remove('sb-active');
            });
            saveToLocalStorage();
            renderTab();
        }

        function switchArea(area) {
            if (isInventarioModalOpen) {
                showNotification('Cierra el modal de inventario antes de cambiar de área');
                return;
            }
            selectedArea = area;
            saveToLocalStorage();
            renderTab();
        }

        // Throttling para notificaciones (mínimo 1s entre cada una)
        let notificationTimeout = null;
        // Timer externo para el toast (evita asignar propiedades en elementos DOM)
        let toastHideTimer = null;
        function showNotification(message) {
            if (notificationTimeout) return;
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            if (!toast || !toastMessage) return;
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            toast.style.animation = 'none';
            void toast.offsetWidth;
            toast.style.animation = '';
            clearTimeout(toastHideTimer);
            toastHideTimer = setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
            notificationTimeout = setTimeout(() => { notificationTimeout = null; }, 1000);
        }

        // Debounce para búsqueda: evita re-renders y escrituras en localStorage en cada tecla
        let _searchDebounceTimer = null;
        function updateSearchTerm(value) {
            searchTerm = value;
            clearTimeout(_searchDebounceTimer);
            _searchDebounceTimer = setTimeout(() => {
                saveToLocalStorage();
                renderTab();
                // CORRECCIÓN BUG 1: restaurar foco y cursor al final del input de búsqueda
                // tras el re-render que destruye y recrea el DOM
                const searchInput = document.querySelector('#tabContent input[type="text"]');
                if (searchInput) {
                    searchInput.focus();
                    const len = searchInput.value.length;
                    searchInput.setSelectionRange(len, len);
                }
            }, 300);
        }

        function updateSelectedGroup(value) {
            selectedGroup = value;
            saveToLocalStorage();
            renderTab();
        }

        // FIX 4 — Re-render: preservar scroll y foco; evitar salto visual innecesario
        // BUG-FIX m4: _getElementSelector también detecta input de búsqueda por placeholder
        function _getElementSelector(el) {
            if (!el || el === document.body) return null;
            if (el.id) return '#' + el.id;
            // Detectar el input de búsqueda por su placeholder único
            if (el.tagName === 'INPUT' && el.placeholder === 'Buscar...') {
                return '#tabContent input[placeholder="Buscar..."]';
            }
            // Para inputs dentro de tabContent: guardar posición en el formulario
            const parent = el.closest('[data-render-key]');
            if (parent) return '[data-render-key="' + parent.dataset.renderKey + '"] ' + el.tagName.toLowerCase();
            return null;
        }

        function renderTab() {
            updateHeaderActions();
            const content = document.getElementById('tabContent');

            // FIX 4: capturar estado antes del re-render
            const scrollY  = window.scrollY || window.pageYOffset;
            const focused  = document.activeElement;
            const focusedSelector = _getElementSelector(focused);
            // Preservar cursor en inputs de texto (p.ej. buscador)
            const cursorPos = (focused && focused.selectionStart !== undefined) ? focused.selectionStart : null;
            const focusedValue = (focused && focused.tagName === 'INPUT') ? focused.value : null;

            content.style.animation = 'none';
            void content.offsetWidth;
            content.style.animation = '';

            switch(activeTab) {
                case 'inicio':      content.innerHTML = renderInicioTab(); break;
                case 'productos':   content.innerHTML = renderProductosTab(); break;
                case 'pedidos':     content.innerHTML = renderPedidosTab(); break;
                case 'inventario':  content.innerHTML = renderInventarioTab(); break;
                case 'historia':    content.innerHTML = renderHistoriaTab(); break;
            }

            // FIX 4: restaurar scroll (en siguiente frame para no luchar con el layout)
            if (scrollY > 0) {
                requestAnimationFrame(() => { window.scrollTo(0, scrollY); });
            }

            // FIX 4: restaurar foco y cursor si el elemento existe en el nuevo DOM
            if (focusedSelector) {
                requestAnimationFrame(() => {
                    try {
                        const restored = document.querySelector(focusedSelector);
                        if (restored && typeof restored.focus === 'function') {
                            restored.focus({ preventScroll: true });
                            if (cursorPos !== null && restored.setSelectionRange) {
                                const len = (focusedValue !== null ? focusedValue : restored.value).length;
                                const pos = Math.min(cursorPos, len);
                                restored.setSelectionRange(pos, pos);
                            }
                        }
                    } catch (_) { /* selector inválido — ignorar */ }
                });
            }
        }

        function openInventarioModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            inventarioModalProductId = productId;
            if (!inventarioConteo[productId]) inventarioConteo[productId] = {};
            const areaData = inventarioConteo[productId][selectedArea] || { enteras: 0, abiertas: [] };
            document.getElementById('inventarioModalTitle').textContent = product.name;
            document.getElementById('inventarioModalSubtitle').textContent = (product.group || 'General') + ' · ' + (product.unit || '') + ' — ' + areas[selectedArea];
            document.getElementById('inv_enteras').value = areaData.enteras || 0;
            const container = document.getElementById('inv_abiertasContainer');
            container.innerHTML = '';
            const abiertas = (areaData.abiertas && areaData.abiertas.length > 0) ? areaData.abiertas : [0];
            abiertas.forEach((val, idx) => renderAbiertaInput(val, idx));
            isInventarioModalOpen = true;
            disableAreaButtons(true);
            const modal = document.getElementById('inventarioModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                const firstInput = modal.querySelector('input, button');
                if (firstInput) firstInput.focus();
            }, 50);
            modal._trapHandler = function(e) {
                if (e.key !== 'Tab') return;
                const focusable = Array.from(modal.querySelectorAll('input, select, textarea, button'));
                const first = focusable[0], last = focusable[focusable.length - 1];
                if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
                else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
            };
            modal.addEventListener('keydown', modal._trapHandler);
        }

        function renderAbiertaInput(val, idx) {
            const container = document.getElementById('inv_abiertasContainer');
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2';
            div.id = 'abierta_row_' + idx;
            div.innerHTML = '<span class="text-xs font-medium text-gray-500 w-16 flex-shrink-0">Abierta ' + (idx + 1) + '</span>' +
                '<input type="number" id="inv_abierta_' + idx + '" min="0" step="0.01" value="' + val + '" ' +
                'class="flex-1 px-3 py-2 bg-white text-gray-900 border-2 border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-400 focus:border-transparent text-center font-bold" ' +
                'placeholder="0.0">' +
                (idx > 0 ? '<button onclick="removeAbiertaInModal(' + idx + ')" class="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>' : '<div class="w-8"></div>');
            container.appendChild(div);

        function addAbiertaInModal() {
            const container = document.getElementById('inv_abiertasContainer');
            if (container.children.length >= 10) {
                showNotification('Máximo 10 botellas abiertas permitidas');
                return;
            }
            const idx = container.children.length;
            renderAbiertaInput(0, idx);
        }

        function removeAbiertaInModal(idx) {
            const container = document.getElementById('inv_abiertasContainer');
            const vals = [];
            for (let i = 0; i < container.children.length; i++) {
                const input = document.getElementById('inv_abierta_' + i);
                if (input && i !== idx) vals.push(parseFloat(input.value) || 0);
            }
            container.innerHTML = '';
            vals.forEach((v, i) => renderAbiertaInput(v, i));
        }

        function closeInventarioModal() {
            const modal = document.getElementById('inventarioModal');
            if (modal._trapHandler) { modal.removeEventListener('keydown', modal._trapHandler); modal._trapHandler = null; }
            modal.classList.add('hidden');
            inventarioModalProductId = null;
            isInventarioModalOpen = false;
            disableAreaButtons(false);
        }

        function saveInventarioModal() {
            if (!inventarioModalProductId) return;
            const enteras = Math.max(0, parseFloat(document.getElementById('inv_enteras').value) || 0);  // BUG-FIX m1: enteras siempre entero no negativo
            const container = document.getElementById('inv_abiertasContainer');
            const abiertas = [];
            for (let i = 0; i < container.children.length; i++) {
                const input = document.getElementById('inv_abierta_' + i);
                if (input) abiertas.push(parseFloat(input.value) || 0);
            }
            if (!inventarioConteo[inventarioModalProductId]) inventarioConteo[inventarioModalProductId] = {};
            inventarioConteo[inventarioModalProductId][selectedArea] = { enteras, abiertas };
            // BUG-FIX C1: variable `product` era dead-code tras Fix 1; eliminada
            // FIX 1 — mantener stockByArea sincronizado desde inventarioConteo
            syncStockByAreaFromConteo();
            saveToLocalStorage();
            showNotification('Conteo guardado en ' + areas[selectedArea]);
            closeInventarioModal();
            renderTab();
        }


        // Toggle expansión de tarjeta de inventario (botellas abiertas adicionales)
        function toggleCardExpand(productId, event) {
            event.stopPropagation(); // no abrir el modal
            if (expandedCards.has(productId)) {
                expandedCards.delete(productId);
            } else {
                expandedCards.add(productId);
            }
            // Actualizar UI sin re-render completo (más eficiente)
            const btn   = document.getElementById('card-expand-btn-' + productId);
            const extra = document.getElementById('card-extra-' + productId);
            if (!btn || !extra) return;
            const isOpen = expandedCards.has(productId);
            extra.classList.toggle('open', isOpen);
            btn.classList.toggle('open', isOpen);
            btn.setAttribute('aria-expanded', isOpen);
            btn.querySelector('span').textContent = isOpen ? 'Ocultar' : 'Ver más abiertas';
        }

        function toggleInventory(invId) {
            if (expandedInventories.has(invId)) expandedInventories.delete(invId);

            saveToLocalStorage();
            renderTab();
        }

        function downloadInventory(invId) {
            const inv = inventories.find(i => i.id === invId);
            if (!inv) return;
            const headers = ['Producto', 'Stock (Enteras)', 'Abiertas', 'Unidad', 'Grupo'];
            const rows = inv.products.map(p => [p.name || '', p.stock || 0, (p.abiertas || []).join(' + '), p.unit || '', p.group || 'General']);
            const csvEscape = v => { const s = String(v == null ? '' : v); return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s; };
            const csv = [headers].concat(rows).map(row => row.map(csvEscape).join(',')).join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const safeDate = (inv.date || '').replace(/[/:,\s]/g, '-').replace(/-+/g, '-').replace(/-$/, '');  // BUG-FIX M2
            a.download = inv.id + '_' + safeDate + '.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => window.URL.revokeObjectURL(url), 1000);
            showNotification('Inventario descargado');
        }

            let message = '*INVENTARIO ' + inv.id + '*\n';
            message += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            message += '📅 *Fecha:* ' + inv.date + '\n';
            message += '📍 *Área:* ' + (areas[inv.area] || inv.area || 'N/A') + '\n';
            message += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
            message += '*PRODUCTOS:*\n';
            inv.products.forEach((p, i) => {
                message += (i + 1) + '. ' + p.name + '\n';
                message += '   • Enteras: ' + p.stock + ' ' + p.unit + '\n';
                if (p.abiertas && p.abiertas.length) {
                    message += '   • Abiertas: ' + p.abiertas.map(a => (a || 0).toFixed(2)).join(' + ') + '\n';
                }
                message += '   • Grupo: ' + p.group + '\n\n';
            });
            message += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            message += '📦 *Total Enteras:* ' + (inv.totalProducts || 0).toFixed(2) + '\n';
            const url = 'https://wa.me/?text=' + encodeURIComponent(message);

        function generateProductId() {
            let maxNum = 0;
            products.forEach(p => {
                const match = p.id.match(/^PRD-(\d+)$/);
                if (match) maxNum = Math.max(maxNum, parseInt(match[1], 10));
            });
            return 'PRD-' + String(maxNum + 1).padStart(3, '0');
        }

        function openProductModal(productId) {
            const modal = document.getElementById('productModal');
            const title = document.getElementById('productModalTitle');
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productUnit').value = 'Botellas';
            document.getElementById('productGroup').value = '';
            if (productId) {
                const product = products.find(p => p.id === productId);
                if (product) {
                    editingProductId = product.id;
                    title.textContent = 'Editar Producto';
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productName').value = product.name || '';
                    document.getElementById('productUnit').value = product.unit || 'Botellas';
                    document.getElementById('productGroup').value = product.group || '';
                } else {
                    showNotification('Producto no encontrado');
                    return;
                }
            } else {
                editingProductId = null;
                title.textContent = 'Agregar Producto';
                document.getElementById('productId').value = generateProductId();
            }
            modal.classList.remove('hidden');
            // Mover foco al primer campo interactivo
            setTimeout(() => {
                const firstInput = modal.querySelector('input, select, button');
                if (firstInput) firstInput.focus();
            }, 50);
            // Focus trap
            modal._trapHandler = function(e) {
                if (e.key !== 'Tab') return;
                const focusable = Array.from(modal.querySelectorAll('input, select, textarea, button'));
                const first = focusable[0], last = focusable[focusable.length - 1];
                if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
                else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
            };
            modal.addEventListener('keydown', modal._trapHandler);
        }

        function closeProductModal() {
            const modal = document.getElementById('productModal');
            if (modal._trapHandler) { modal.removeEventListener('keydown', modal._trapHandler); modal._trapHandler = null; }
            modal.classList.add('hidden');
            editingProductId = null;
        }

        function saveProduct() {
            const name = document.getElementById('productName').value.trim();
            if (!name) { showNotification('La descripción es requerida'); return; }
            let productId = document.getElementById('productId').value.trim();
            if (!productId) productId = generateProductId();
            // Validar duplicado de ID
            const idExists = products.some(p => p.id === productId && p.id !== editingProductId);
            if (idExists) { showNotification('El ID ya existe'); return; }
            // Validar duplicado de nombre + grupo (case-insensitive)
            const group = document.getElementById('productGroup').value.trim() || 'General';
            const nameExists = products.some(p =>
                (p.name || '').toLowerCase() === name.toLowerCase() &&
                (p.group || '').toLowerCase() === group.toLowerCase() &&
                p.id !== editingProductId
            );
            if (nameExists) { showNotification('Ya existe un producto con ese nombre en el mismo grupo'); return; }

            const unit = document.getElementById('productUnit').value;

            if (editingProductId) {
                const product = products.find(p => p.id === editingProductId);
                if (product) {
                    // Si cambia el ID, actualizar también en inventarioConteo
                    if (editingProductId !== productId) {
                        if (inventarioConteo[editingProductId]) {
                            inventarioConteo[productId] = inventarioConteo[editingProductId];
                            delete inventarioConteo[editingProductId];
                        }
                    }
                    product.id = productId;
                    product.name = name;
                    product.unit = unit;
                    product.group = group;
                    // stockByArea se conserva
                }
                showNotification('Producto actualizado');
            } else {
                const newProduct = {
                    id: productId,
                    name: name,
                    unit: unit,
                    group: group,
                    stockByArea: { almacen: 0, barra1: 0, barra2: 0 }
                };
                products.push(newProduct);
                showNotification('Producto agregado');
            }
            saveToLocalStorage();
            closeProductModal();
            renderTab();
        }

        function editProduct(id) { openProductModal(id); }

        function deleteProduct(id) {
            if (confirm('¿Está seguro de eliminar este producto?')) {
                products = products.filter(p => p.id !== id);
                cart = cart.filter(item => item.id !== id);
                delete inventarioConteo[id];
                saveToLocalStorage();
                showNotification('Producto eliminado');
                renderTab();
            }
        }

        function deleteAllProducts() {
            if (products.length === 0) { showNotification('No hay productos para eliminar'); return; }
            if (confirm('¿Está seguro de que desea eliminar TODOS los productos? Esta acción no se puede deshacer.')) {
                products = []; cart = []; inventarioConteo = {};
                // CORRECCIÓN BUG 2: los pedidos son registros históricos inmutables.
                // Solo se vacía el carrito activo; los productos de pedidos ya creados
                // se conservan tal como estaban al momento de generarlos.
                saveToLocalStorage();
                showNotification('Todos los productos han sido eliminados');
                renderTab();
            }
        }

        function filterByGroup() {
            let filtered = products;
            if (selectedGroup !== 'Todos') filtered = filtered.filter(p => p.group === selectedGroup);
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(term) || (p.id || '').toLowerCase().includes(term));
            }
            return filtered;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || !product.id) return;
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) existingItem.quantity++;
            else cart.push({ id: product.id, name: product.name, unit: product.unit || '', group: product.group || 'General', quantity: 1 });
            saveToLocalStorage();
            showNotification(product.name + ' agregado al carrito');
            updateHeaderActions();
        }

        function renderOrderTable() {
            const tbody = document.getElementById('orderProductsTable');
            const emptyCart = document.getElementById('emptyCart');
            const orderTotal = document.getElementById('orderTotal');
            if (cart.length === 0) {
                tbody.innerHTML = '';
                emptyCart.classList.remove('hidden');
                orderTotal.textContent = 'Total: 0';
                return;
            }
            emptyCart.classList.add('hidden');
            let html = '';
            let total = 0;
            cart.forEach(item => {

            });

        }

        function updateCartQuantity(productId, quantity) {
            const item = cart.find(i => i.id === productId);
            if (!item) return;
            let val = parseFloat(quantity);
            if (isNaN(val) || val <= 0) val = 0.01;
            // Validar según unidad (si es entero, redondear y forzar entero)
            const product = products.find(p => p.id === productId);
            if (product) {
                const integerUnits = ['Piezas', 'Unidad', 'Botellas', 'Paquete', 'Tapas', 'Cartones'];
                if (integerUnits.includes(product.unit)) {
                    val = Math.round(val);
                    if (val < 1) val = 1;
                } else {
                    if (val < 0.01) val = 0.01;
                }
            }
            item.quantity = val;
            saveToLocalStorage();
            renderOrderTable();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveToLocalStorage();
            renderOrderTable();
            updateHeaderActions();
            if (cart.length === 0) showNotification('Carrito vacío');
        }

        function createOrder() {
            const supplier = document.getElementById('orderSupplier').value.trim();

            if (cart.length === 0) { showNotification('Agrega productos al carrito'); return; }
            const deliveryDate = document.getElementById('orderDeliveryDate').value;
            const note = document.getElementById('orderNote').value.trim();
            let maxOrderNum = 0;
            orders.forEach(o => { const m = o.id.match(/^PED-(\d+)$/); if (m) maxOrderNum = Math.max(maxOrderNum, parseInt(m[1], 10)); });
            const order = {
                id: 'PED-' + String(maxOrderNum + 1).padStart(3, '0'),
                date: new Date().toLocaleString(),
                supplier: supplier,
                deliveryDate: deliveryDate || null,
                note: note || null,
                products: [...cart],
                total: cart.reduce((sum, item) => sum + item.quantity, 0)
            };

            cart = [];

            shareOrderWhatsApp(order.id);
            closeOrderModal();
