        // FIX 5 — Parseo robusto de números provenientes de Excel/CSV
        function parseExcelNumber(val) {
            if (val === null || val === undefined) return 0;
            // SheetJS ya devuelve numbers para celdas numéricas — pasar directo
            if (typeof val === 'number') {
                // Rechazar seriales de fecha Excel (> 2958465 = 31/12/9999)
                if (!isFinite(val) || val > 2958465) return 0;
                return val;
            }
            const str = String(val).trim()
                .replace(/[€$£¥₩₹\s]/g, '')  // quitar monedas y espacios
                .replace(/^-/, m => m);              // BUG-FIX M1: conservar signo negativo (positivo no necesita marca)

            if (!str || str === '-' || str === '+') return 0;

            // Formato europeo con punto como miles y coma como decimal: 1.234,56
            if (/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(str)) {
                return parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0;
            }
            // Coma como único separador decimal: 1234,56
            if (/^\d+(,\d+)$/.test(str)) {
                return parseFloat(str.replace(',', '.')) || 0;
            }
            // Punto como miles sin decimal: 1.234
            if (/^\d{1,3}(\.\d{3})+$/.test(str)) {
                return parseFloat(str.replace(/\./g, '')) || 0;
            }
            // Formato estándar o ya limpio
            return parseFloat(str) || 0;
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const fileInput = event.target;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    if (!workbook.SheetNames || workbook.SheetNames.length === 0) { showNotification('El archivo no contiene hojas válidas'); return; }
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    if (!jsonData || jsonData.length === 0) { showNotification('El archivo no contiene datos válidos'); return; }
                    
                    // Mapeo flexible de columnas
                    const columnMap = {
                        id: ['ID', 'Id', 'id', 'Código', 'codigo'],
                        name: ['Descripción', 'descripcion', 'Producto', 'producto', 'Nombre', 'nombre'],
                        unit: ['Unidad', 'unidad', 'Medida', 'medida'],
                        group: ['Grupo', 'grupo', 'Categoría', 'categoria'],
                        stock: ['Cantidad', 'cantidad', 'Stock', 'stock']
                    };

                    const existingIds = new Set(products.map(p => p.id));
                    let maxNum = 0;
                    products.forEach(p => { const m = p.id.match(/^PRD-(\d+)$/); if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10)); });
                    let nextNum = maxNum + 1;
                    const toImport = [];
                    const usedInBatch = new Set();
                    let skipped = 0;

                    jsonData.forEach((row) => {
                        // Buscar nombre (obligatorio)
                        let name = '';
                        for (const key of columnMap.name) {
                            if (row[key] !== undefined) { name = String(row[key]).trim(); break; }
                        }
                        if (!name) {
                            skipped++;
                            return; // Omitir filas sin nombre
                        }

                        // Buscar ID
                        let rawId = '';
                        for (const key of columnMap.id) {
                            if (row[key] !== undefined) { rawId = String(row[key]).trim(); break; }
                        }
                        let id = rawId;
                        if (!id) {
                            do { id = 'PRD-' + String(nextNum++).padStart(3, '0'); } while (existingIds.has(id) || usedInBatch.has(id));
                        } else {
                            if (existingIds.has(id) || usedInBatch.has(id)) {
                                do { id = 'PRD-' + String(nextNum++).padStart(3, '0'); } while (existingIds.has(id) || usedInBatch.has(id));
                            }
                        }
                        usedInBatch.add(id);

                        // Buscar unidad
                        let unit = 'Unidad';
                        for (const key of columnMap.unit) {
                            if (row[key] !== undefined) { unit = String(row[key]).trim(); break; }
                        }

                        // Buscar grupo
                        let group = 'General';
                        for (const key of columnMap.group) {
                            if (row[key] !== undefined) { group = String(row[key]).trim(); break; }
                        }

                        // Buscar stock — FIX 5: usar parseExcelNumber para manejar formatos
                        let stock = 0;
                        for (const key of columnMap.stock) {
                            if (row[key] !== undefined) { stock = parseExcelNumber(row[key]); break; }
                        }

                        const product = {
                            id: id,
                            name: name,
                            stockByArea: {
                                almacen: stock,
                                barra1: 0,
                                barra2: 0
                            },
                            unit: unit,
                            group: group
                        };
                        toImport.push(product);
                    });

                    products = products.concat(toImport);
                    showNotification(toImport.length + ' productos importados. ' + (skipped ? skipped + ' filas omitidas por falta de nombre.' : ''));
                    activeTab = 'inicio';
                    selectedGroup = 'Todos';
                    searchTerm = '';
                    selectedArea = 'almacen';
                    saveToLocalStorage();
                    renderTab();
                    fileInput.value = '';
                } catch (error) {
                    showNotification('Error al importar archivo: ' + error.message);
                    console.error(error);
                    fileInput.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportToExcel() {
            const areaKeys  = ['almacen', 'barra1', 'barra2'];
            const areaNames = { almacen: 'Almacén', barra1: 'Barra 1', barra2: 'Barra 2' };
            const areaColor = { almacen: '7C3AED', barra1: '2563EB', barra2: 'EA580C' };
            const maxAbiertas = { almacen: 1, barra1: 1, barra2: 1 };
            products.forEach(p => {
                areaKeys.forEach(area => {
                    const d = inventarioConteo[p.id] && inventarioConteo[p.id][area];
                    if (d && d.abiertas && d.abiertas.length > maxAbiertas[area]) maxAbiertas[area] = d.abiertas.length;
                });
            });
            const FIXED_COLS = 4;
            const headerRow = ['ID', 'Producto', 'Unidad', 'Grupo'];
            const colMeta = [null, null, null, null];
            areaKeys.forEach(area => {
                colMeta.push({ area, tipo: 'entera' });
                headerRow.push(areaNames[area] + ' – Bot. Entera');
                for (let i = 1; i <= maxAbiertas[area]; i++) {
                    colMeta.push({ area, tipo: 'abierta' });
                    headerRow.push(areaNames[area] + ' – Bot. Abierta ' + i);
                }
            });
            colMeta.push('total');
            headerRow.push('TOTAL');
            const totalCols = headerRow.length;
            const TOTAL_COL = totalCols - 1;

            function getNumericValues(p) {
                const nums = [];
                areaKeys.forEach(area => {
                    const d = (inventarioConteo[p.id] && inventarioConteo[p.id][area]) || { enteras: 0, abiertas: [] };
                    nums.push(d.enteras !== undefined ? (d.enteras || 0) : 0);
                    for (let i = 0; i < maxAbiertas[area]; i++) {
                        nums.push((d.abiertas && d.abiertas[i] !== undefined) ? d.abiertas[i] : 0);
                    }
                });
                return nums;
            }

            const sorted = [...products].sort((a, b) => (a.group || '').localeCompare(b.group || ''));
            const groups = [...new Set(sorted.map(p => p.group || 'General'))];
            const wsRows = [];
            const grandTotNums = Array(totalCols - FIXED_COLS - 1).fill(0);
            let grandTotTotal = 0;

            groups.forEach(group => {
                const groupProducts = sorted.filter(p => (p.group || 'General') === group);
                const groupNums = Array(totalCols - FIXED_COLS - 1).fill(0);
                let groupTotal = 0;
                let evenCount = 0;
                groupProducts.forEach(p => {
                    const nums = getNumericValues(p);
                    const rowTotal = nums.reduce((s, v) => s + v, 0);
                    wsRows.push({ type: 'data', even: evenCount % 2 === 0, data: [p.id, p.name, p.unit, p.group || 'General', ...nums, rowTotal] });
                    // Acumular sin modificar arrays durante iteración
                    for (let i = 0; i < nums.length; i++) {
                        groupNums[i] += nums[i];
                        grandTotNums[i] += nums[i];
                    }
                    groupTotal += rowTotal;
                    grandTotTotal += rowTotal;
                    evenCount++;
                });
                wsRows.push({ type: 'subtotal', data: ['', 'Subtotal – ' + group, '', '', ...groupNums, groupTotal] });
            });
            wsRows.push({ type: 'grandtotal', data: ['', 'GRAN TOTAL', '', '', ...grandTotNums, grandTotTotal] });

            const wb = XLSX.utils.book_new();
            const allRows = [headerRow, ...wsRows.map(r => r.data)];
            const ws = XLSX.utils.aoa_to_sheet(allRows);
            ws['!cols'] = colMeta.map((m, i) => {
                if (i === 0) return { wch: 10 };
                if (i === 1) return { wch: 32 };
                if (i === 2) return { wch: 12 };
                if (i === 3) return { wch: 16 };
                if (i === TOTAL_COL) return { wch: 14 };
                return { wch: 22 };
            });

            const fixedHdrStyle = { font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 }, fill: { fgColor: { rgb: '374151' } }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: { bottom: { style: 'medium', color: { rgb: 'FFFFFF' } } } };
            const grupoHdrStyle = { ...fixedHdrStyle, fill: { fgColor: { rgb: '6B7280' } } };
            const totalHdrStyle = { ...fixedHdrStyle, fill: { fgColor: { rgb: '065F46' } } };

            for (let ci = 0; ci < totalCols; ci++) {
                const ref = XLSX.utils.encode_cell({ r: 0, c: ci });
                if (!ws[ref]) continue;
                if (ci === 3) { ws[ref].s = grupoHdrStyle; continue; }
                if (ci === TOTAL_COL) { ws[ref].s = totalHdrStyle; continue; }
                if (ci < FIXED_COLS) { ws[ref].s = fixedHdrStyle; continue; }
                const meta = colMeta[ci];
                ws[ref].s = { font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 }, fill: { fgColor: { rgb: areaColor[meta.area] } }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: { left: { style: 'thin', color: { rgb: 'FFFFFF' } }, right: { style: 'thin', color: { rgb: 'FFFFFF' } }, bottom: { style: 'medium', color: { rgb: 'FFFFFF' } } } };
            }

            const rowHeights = [{ hpt: 40 }];
            wsRows.forEach((wsRow, ri) => {
                const rowIdx = ri + 1;
                if (wsRow.type === 'subtotal') {
                    rowHeights.push({ hpt: 22 });
                    for (let ci = 0; ci < totalCols; ci++) {
                        const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
                        const val = wsRow.data[ci];
                        if (!ws[ref]) ws[ref] = { t: ci >= FIXED_COLS ? 'n' : 's', v: ci >= FIXED_COLS ? 0 : '' };
                        ws[ref].s = { font: { bold: true, color: { rgb: '1E1B4B' }, sz: 10, italic: true }, fill: { fgColor: { rgb: 'DDD6FE' } }, alignment: { horizontal: ci >= FIXED_COLS ? 'center' : 'left', vertical: 'center' }, border: { top: { style: 'thin', color: { rgb: '7C3AED' } }, bottom: { style: 'thin', color: { rgb: '7C3AED' } }, left: { style: 'hair', color: { rgb: 'A78BFA' } }, right: { style: 'hair', color: { rgb: 'A78BFA' } } } };
                        if (ci >= FIXED_COLS) { ws[ref].t = 'n'; ws[ref].v = typeof val === 'number' ? val : 0; ws[ref].z = '0.##'; }
                    }
                    return;
                }
                if (wsRow.type === 'grandtotal') {
                    rowHeights.push({ hpt: 26 });
                    for (let ci = 0; ci < totalCols; ci++) {
                        const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
                        const val = wsRow.data[ci];
                        if (!ws[ref]) ws[ref] = { t: ci >= FIXED_COLS ? 'n' : 's', v: ci >= FIXED_COLS ? 0 : '' };
                        ws[ref].s = { font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 }, fill: { fgColor: { rgb: '065F46' } }, alignment: { horizontal: ci >= FIXED_COLS ? 'center' : 'left', vertical: 'center' }, border: { top: { style: 'medium', color: { rgb: '064E3B' } }, bottom: { style: 'medium', color: { rgb: '064E3B' } }, left: { style: 'medium', color: { rgb: '064E3B' } }, right: { style: 'medium', color: { rgb: '064E3B' } } } };
                        if (ci >= FIXED_COLS) { ws[ref].t = 'n'; ws[ref].v = typeof val === 'number' ? val : 0; ws[ref].z = '0.##'; }
                    }
                    return;
                }
                rowHeights.push({ hpt: 20 });
                const even = wsRow.even;
                for (let ci = 0; ci < totalCols; ci++) {
                    const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
                    if (!ws[ref]) continue;
                    const meta = colMeta[ci];
                    let bgRgb;
                    if (ci === TOTAL_COL) bgRgb = even ? 'D1FAE5' : 'ECFDF5';
                    else if (meta && meta.tipo === 'abierta') bgRgb = even ? 'FFF7ED' : 'FEF3C7';
                    else if (meta && meta.tipo === 'entera') bgRgb = even ? 'EDE9FE' : 'F5F3FF';
                    else bgRgb = even ? 'F9FAFB' : 'FFFFFF';
                    ws[ref].s = { fill: { fgColor: { rgb: bgRgb } }, alignment: { horizontal: ci >= FIXED_COLS ? 'center' : 'left', vertical: 'center' }, border: { top: { style: 'hair', color: { rgb: 'E5E7EB' } }, bottom: { style: 'hair', color: { rgb: 'E5E7EB' } }, left: { style: 'hair', color: { rgb: 'E5E7EB' } }, right: { style: 'hair', color: { rgb: 'E5E7EB' } } } };
                    if (ci >= FIXED_COLS) { ws[ref].t = 'n'; ws[ref].z = '0.##'; }
                }
            });
            ws['!rows'] = rowHeights;
            // Ajustar !ref para incluir todas las filas (header + wsRows)
            ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: wsRows.length, c: totalCols - 1 } });
            XLSX.utils.book_append_sheet(wb, ws, 'Inventario');
            const fileName = 'inventario_' + new Date().toISOString().split('T')[0] + '.xlsx';
            XLSX.writeFile(wb, fileName);
            showNotification('✅ Excel exportado con grupos y totales');
        }

        function importFullData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    // Validar estructura básica
                    if (!Array.isArray(data.products) || !Array.isArray(data.orders) || !Array.isArray(data.inventories) || !Array.isArray(data.cart) || data.inventarioConteo === null || typeof data.inventarioConteo !== 'object') {
                        showNotification('El archivo no tiene el formato correcto');
                        return;
                    }
                    if (confirm('¿Estás seguro de reemplazar todos los datos actuales con los del archivo?')) {
                        products = data.products;
                        orders = data.orders;
                        inventories = data.inventories;
                        cart = data.cart;

                        // CORRECCIÓN BUG 3: aplicar la misma migración de formato que
                        // loadFromLocalStorage usa, para soportar backups de versiones antiguas
                        // donde inventarioConteo era plano { productId: { enteras, abiertas } }
                        // en lugar del nuevo formato por área { productId: { almacen: {...}, ... } }
                        const rawConteo = data.inventarioConteo || {};
                        const migrated = {};
                        Object.keys(rawConteo).forEach(prodId => {
                            const val = rawConteo[prodId];
                            if (!val || typeof val !== 'object') return;
                            if (typeof val.enteras !== 'undefined' && val.almacen === undefined && val.barra1 === undefined && val.barra2 === undefined) {  // BUG-FIX M3: usar === undefined para no fallar cuando area vale 0
                                migrated[prodId] = { almacen: val };
                            } else {
                                migrated[prodId] = val;
                            }
                        });
                        inventarioConteo = migrated;
                        // FIX 1 — reconstruir stockByArea después de importar
                        syncStockByAreaFromConteo();

                        activeTab = data.activeTab || 'inicio';
                        searchTerm = data.searchTerm || '';
                        selectedGroup = data.selectedGroup || 'Todos';
                        selectedArea = data.selectedArea || 'almacen';
                        expandedInventories = new Set(data.expandedInventories || []);

                        saveToLocalStorage();
                        switchTab(activeTab);
                        showNotification('Datos importados correctamente');
                    }
                } catch (error) {
                    showNotification('Error al leer el archivo: ' + error.message);
                    console.error(error);
                }
                event.target.value = ''; // Limpiar input
            };
            reader.readAsText(file);
        }

        // ==================== INICIALIZACIÓN UNIFICADA ====================
        // Un único listener DOMContentLoaded que centraliza toda la lógica de arranque
        // (incluye el patch de seguridad que antes era un bloque separado).
        // CORRECCIÓN BUG 6: los listeners de fileInput e importDataInput se registran
        // aquí dentro (no a nivel de script suelto) para garantizar que los elementos
        // ya existen en el DOM independientemente de dónde esté colocado el <script>.
        window.addEventListener('DOMContentLoaded', function() {
            // --- Inicializar tema antes que todo lo demás ---
            initTheme();

            // --- Listeners de archivos ---
            document.getElementById('fileInput').addEventListener('change', function(e) { window.handleFileImport(e); });
            document.getElementById('importDataInput').addEventListener('change', function(e) { window.importFullData(e); });

            // --- App principal ---
            initializeApp();

            // --- Patch de seguridad: guardar referencia a exportToExcel DESPUÉS de que initializeApp la defina ---
            let exportingExcel = false;
            const originalExport = window.exportToExcel;
            if (originalExport) {
                window.exportToExcel = function() {
                    if (exportingExcel) { alert('Exportación en proceso...'); return; }
                    exportingExcel = true;
                    try { originalExport(); } catch(e) { alert('Error exportando Excel'); console.error(e); }
                    setTimeout(() => exportingExcel = false, 3000);
                };
            }

            const originalImport = window.handleFileImport;
            if (originalImport) {
                window.handleFileImport = function(e) {
                    try { originalImport(e); } catch(err) { alert('Archivo Excel inválido o corrupto'); console.error(err); }
                };
            }

            // --- Auto-guardado inteligente (mínimo 10s entre guardados) ---
            let lastSave = 0;
            function smartAutoSave() {
                const now = Date.now();
                if (now - lastSave < 10000) return;
                lastSave = now;
                if (window.saveToLocalStorage) {
                    try { saveToLocalStorage(); } catch(e) { console.warn('Error guardando'); }
                }
            }
            setInterval(smartAutoSave, 10000);
        });
    </script>
</body>
</html>
